services:
  - type: web
    name: anode-trending-2026
    env: python
    plan: free
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: gunicorn anode_trending_2026:server --bind 0.0.0.0:$PORT --workers 2
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: ANODE_XLSX_PATH
        sync: false
      - key: SKG_XLSX_PATH
        sync: false
